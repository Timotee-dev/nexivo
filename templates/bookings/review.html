{% extends 'base.html' %}
{% block title %}Leave Review{% endblock %}
{% block content %}
<div class="container" style="padding-top:52px;padding-bottom:52px;display:flex;justify-content:center">
  <div class="card" style="width:100%;max-width:500px">
    <div class="card-header"><span class="card-title"><i class="bi bi-star-fill"></i> Leave a Review</span></div>
    <div class="card-body">
      <div class="pay-summary" style="margin-bottom:20px"><div class="pay-summary-row"><span>Service</span><strong>{{ b.service.title }}</strong></div><div class="pay-summary-row"><span>Provider</span><strong>{{ b.provider.provider_profile.business_name }}</strong></div><div class="pay-summary-row"><span>Date</span><strong>{{ b.date|date:"F j, Y" }}</strong></div></div>
      <form method="post" novalidate>{% csrf_token %}
        <div class="field"><label>Rating</label>{{ form.rating }}</div>
        <div class="field"><label>Your Comment</label>{{ form.comment }}</div>
        <div style="display:flex;gap:10px"><button type="submit" class="btn btn-gold"><i class="bi bi-star-fill"></i> Submit Review</button><a href="{% url 'booking_detail' pk=b.pk %}" class="btn btn-ghost">Back</a></div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
