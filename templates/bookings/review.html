{% extends 'base.html' %}{% block title %}Leave Review{% endblock %}
{% block content %}<div style="max-width:540px;margin:60px auto;padding:0 20px">
<div class="card"><div class="card-header"><span class="card-title"><i class="bi bi-star"></i>Leave a Review</span></div>
<div class="card-body">
<div class="pay-sum" style="margin-bottom:22px">
<div class="pay-row"><span>Service</span><strong>{{ b.service.title }}</strong></div>
<div class="pay-row"><span>Provider</span><strong>{{ b.provider.provider_profile.business_name }}</strong></div>
<div class="pay-row"><span>Date</span><strong>{{ b.date|date:"F j, Y" }}</strong></div>
</div>
<form method="post" novalidate>{% csrf_token %}
<div class="fg"><label>Rating</label>{{ form.rating }}</div>
<div class="fg"><label>Your Comment</label>{{ form.comment }}</div>
<div style="display:flex;gap:11px"><button type="submit" class="btn btn-primary"><i class="bi bi-star-fill"></i> Submit Review</button><a href="{% url 'booking_detail' pk=b.pk %}" class="btn btn-ghost">Back</a></div>
</form></div></div></div>{% endblock %}
